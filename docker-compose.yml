services:
  postgres:
    image: postgres:16-alpine
    container_name: psychologue_postgres
    environment:
      POSTGRES_USER: psychologue
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-psychologue}
      POSTGRES_DB: psychologue
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psychologue"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: psychologue_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psychologue_api
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://psychologue:${POSTGRES_PASSWORD:-psychologue}@postgres:5432/psychologue
      - REDIS_URL=redis://redis:6379/0
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: psychologue_nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build:
      context: ./telegram
      dockerfile: Dockerfile
    container_name: psychologue_bot
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - BACKEND_URL=http://api:8000
      - LOG_FILE=
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
